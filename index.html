
<!--
  Inburgering Dutch Vocabulary Flashcard Game

  This offline HTML page presents a set of essential Dutch words typically
  encountered in integration (inburgering) exams. Each flashcard shows a
  Dutch word on the front and reveals its English translation along with
  an example sentence (in Dutch and English) on the back. Players can
  navigate through the deck, shuffle the order and flip the card to test
  their memory.  The interface is intentionally minimal so it works
  across devices, including iOS iPad browsers that support local
  HTML/JavaScript files.  Note: Safari on iOS may not open HTML files
  directly from the Files app; open it using a third‑party browser like
  Edge or Chrome or host it on a simple web server.
-->

    const allCards = cards.map(item => ({ ...item }));
    let filteredCards = [...allCards];
    let currentIndex = 0;
    let isFlipped = false;

    const card = document.getElementById('card');
    const cardFront = document.getElementById('card-front');
    const cardBack = document.getElementById('card-back');
    const categoryFilter = document.getElementById('category-filter');
    const deckStatus = document.getElementById('deck-status');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');

        function titleCaseCategory(value) {
      return value
        .replace(/_/g, ' ')
        .split(' ')
        .map((word) => word ? word[0].toUpperCase() + word.slice(1) : '')
        .join(' ');
    }

    function resetCardFlip() {
      isFlipped = false;
      card.classList.remove('flip');
    }

    function updateButtons() {
      const hasCards = filteredCards.length > 0;
      nextBtn.disabled = !hasCards;
      prevBtn.disabled = !hasCards;
      shuffleBtn.disabled = filteredCards.length < 2;
    }

    function updateStatus(currentItem) {
      const selectedLabel = categoryFilter.value === 'all'
        ? 'All categories'
        : titleCaseCategory(categoryFilter.value);

      if (!filteredCards.length) {
        deckStatus.textContent = `${selectedLabel} • 0 cards`;
        return;
      }

      const currentCategory = currentItem ? titleCaseCategory(currentItem.category) : '';
      deckStatus.textContent = `${selectedLabel} • Card ${currentIndex + 1} of ${filteredCards.length} • Current: ${currentCategory}`;
    }

    function updateCard() {
      if (!filteredCards.length) {
        cardFront.textContent = 'No cards found';
        cardBack.innerHTML = '<strong>No cards match this category.</strong><br/><br/><small>Choose another category or switch back to All categories.</small>';
        updateButtons();
        updateStatus();
        return;
      }

      const item = filteredCards[currentIndex];
      cardFront.textContent = item.word;
      cardBack.innerHTML = `<strong>${item.translation}</strong><br/><br/>` +
        `<em>${item.example}</em><br/><small>${item.exampleTranslation}</small><br/><br/><small><strong>Category:</strong> ${titleCaseCategory(item.category)}</small>`;
      updateButtons();
      updateStatus(item);
    }

    function flipCard() {
      if (!filteredCards.length) {
        return;
      }

      isFlipped = !isFlipped;
      if (isFlipped) {
        card.classList.add('flip');
      } else {
        card.classList.remove('flip');
      }
    }

    function nextCard() {
      if (!filteredCards.length) {
        return;
      }

      currentIndex = (currentIndex + 1) % filteredCards.length;
      resetCardFlip();
      updateCard();
    }

    function prevCard() {
      if (!filteredCards.length) {
        return;
      }

      currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
      resetCardFlip();
      updateCard();
    }

    function shuffleCards() {
      if (filteredCards.length < 2) {
        return;
      }

      for (let i = filteredCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
      }
      currentIndex = 0;
      resetCardFlip();
      updateCard();
    }

    function applyCategoryFilter() {
      const selectedCategory = categoryFilter.value;
      filteredCards = selectedCategory === 'all'
        ? [...allCards]
        : allCards.filter((item) => item.category === selectedCategory);
      currentIndex = 0;
      resetCardFlip();
      updateCard();
    }

    function populateCategoryFilter() {
      const categories = [...new Set(allCards.map((item) => item.category))].sort();
      categories.forEach((category) => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = titleCaseCategory(category);
        categoryFilter.appendChild(option);
      });
    }

    // Event listeners
    card.addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    categoryFilter.addEventListener('change', applyCategoryFilter);

    // Initialize the interface
    populateCategoryFilter();
    updateCard();
  </script>
