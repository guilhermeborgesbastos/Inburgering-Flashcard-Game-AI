<!--
  Inburgering Dutch Vocabulary Flashcard Game

  This offline HTML page presents a set of essential Dutch words typically
  encountered in integration (inburgering) exams. Each flashcard shows a
  Dutch word on the front and reveals its English translation along with
  an example sentence (in Dutch and English) on the back. Players can
  navigate through the deck, shuffle the order and flip the card to test
  their memory. The interface is intentionally minimal so it works
  across devices, including iOS iPad browsers that support local
  HTML/JavaScript files. Note: Safari on iOS may not open HTML files
  directly from the Files app; open it using a third‑party browser like
  Edge or Chrome or host it on a simple web server.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inburgering Dutch Vocabulary Flashcards</title>
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <div class="header-center">
      <div class="app-icon">📖</div>
      <div class="app-title-text">
        <h1>Inburgering Dutch</h1>
        <p>Vocabulary Flashcards</p>
      </div>
    </div>
  </header>

  <div class="main-content">
    <!-- Study Progress Card -->
    <div class="progress-card">
      <div class="progress-circle">
        <span class="progress-text" id="progress-percentage">7%</span>
      </div>
      <div class="progress-info">
        <div class="progress-title">Study Progress</div>
        <div class="progress-counter" id="progress-counter">12 / 165 cards</div>
        <div class="progress-bar">
          <div class="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- Category Filter -->
    <div class="category-filter-container">
      <div class="category-filter-wrapper">
        <span class="filter-icon">🏷️</span>
        <select id="category-filter">
          <option value="all">All categories</option>
        </select>
      </div>
    </div>

    <!-- Card Info -->
    <div class="card-info">
      <div class="card-info-item">
        <span class="card-info-icon">📄</span>
        <div>
          <div class="card-info-label">Category</div>
          <div class="card-info-value" id="current-category">Noun</div>
        </div>
      </div>
      <div class="card-info-item">
        <span class="card-info-icon">📚</span>
        <div>
          <div class="card-info-label">Remaining</div>
          <div class="card-info-value" id="remaining-cards">153 cards</div>
        </div>
      </div>
    </div>

    <!-- Card Container -->
    <div id="card-container">
      <div class="card" id="card">
        <div class="card-side card-front" id="card-front"></div>
        <div class="card-side card-back" id="card-back"></div>
      </div>
      <div class="card-tap-hint">
        <span class="tap-icon">👆</span>
        <span>Tap card to reveal meaning and phrase example.</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="prev-btn">← Previous</button>
      <button id="shuffle-btn">🔀 Shuffle</button>
      <button id="next-btn">Next →</button>
    </div>

    <!-- Tip Section -->
    <div class="tip-section">
      <span class="tip-icon">💡</span>
      <span id="tip-text">Tip: Use Shuffle to mix things up and improve retention.</span>
    </div>

    <!-- Audio Controls -->
    <div class="audio-controls">
      <button id="play-word-btn" class="audio-btn">🔊 Pronounce Word</button>
      <button id="play-example-btn" class="audio-btn">🔊 Pronounce Phrase</button>
    </div>

    <!-- Speed Control -->
    <div class="speed-control">
      <span>Pronunciation speed:</span>
      <label>
        <input type="radio" name="speech-speed" value="normal" checked>
        Normal
      </label>
      <label>
        <input type="radio" name="speech-speed" value="slower">
        Slower (-25%)
      </label>
      <label>
        <input type="radio" name="speech-speed" value="slow">
        Slow (-50%)
      </label>
    </div>
  </div>

  <footer>
    <a href="https://github.com/guilhermeborgesbastos/Inburgering-Flashcard-Game-AI" target="_blank">
      View on GitHub
    </a>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
